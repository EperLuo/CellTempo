:# default: config values
log_interval: 10 # log every n iterations; default 20 
eval_itervals: 500 # eval interval in iterations; default 100
eval_iters: 1 # number of batches per eval
eval_cell_num: 3000 # number of cells per eval
# n_eval_cell: 100 # number of cells per eval batch
save_ckpt_iter: 10 # save a checkpoint every n iterations
output_dir: "/hpc-cache-pfs/home/bianhaiyang/veloMulan/codeHub/CellTempo/outputs/backbone_ckpt"
comment: "backbone_test"

always_save_checkpoint: True
init_from: 'scratch' #'resume'
# ckpt_path: /hpc-cache-pfs/home/bianhaiyang/veloMulan/outputHub/velo_pretrain_ckpt_202508/velo3000_pretrain_2025_0804_ztnbloss_zeta001_lr1e3/checkpoint-14000
ckpt_path: null

# DDP settings
backend: 'nccl' # 'nccl', 'gloo', etc.
gradient_accumulation_steps: 5  # 5 * 4  # used to simulate larger batch sizes; must fits the number of devices
compile: False # Default True, use PyTorch 2.0 to compile the model to be faster

batch_size: 32
block_size: 286
num_workers: 0

# training dataset
single_dataset_name: null
data_types: [trajectory] #, perturb
data_folders: [/hpc-cache-pfs/home/bianhaiyang/veloMulan/dataHub/scBaseCount_scvelo_rowcount_filtered] #/hpc-cache-pfs/home/bianhaiyang/veloMulan/dataHub/veloBD_rowcount, /hpc-cache-pfs/home/bianhaiyang/veloMulan/dataHub/veloBD_lognorm_ver2, /hpc-cache-pfs/home/bianhaiyang/veloMulan/dataHub/scPert_expanded
dataset_names: [scBasetraj_exp] # velo3000 velo_dataset, perturb_train_val_leave_one_only
meta_info_name: mix_meta_info_vq_traj.json # mix_meta_info_expanded
mapping_dict: cell_id_mapping_dict.json
global_dataset: scBasetraj_exp
vq_vae_path: /hpc-cache-pfs/home/bianhaiyang/veloMulan/codeHub/CellTempo/outputs/vqvae_ckpt/vqvae_test/checkpoint-200/vqmodel

max_new_tokens: 512

train_mode: 'pretrain'

# model
n_embd: 1120
n_head: 20
n_layer: 24
dropout: 0.1 # for pretraining 0 is good, for finetuning try 0.1+
bias: False
cell_pos_num: 21

# adamw optimizer
learning_rate: 1.0e-4 #  6.0e-4; max learning rate, 6.0 not 6 
max_iters: 50000 # total number of training iterations'
max_epochs: 10
weight_decay: 1.0e-1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0 # clip gradients at this value, or disable if == 0.0


# learning rate decay settings
decay_lr: True # whether to decay the learning rate
warmup_iters: 1000 # how many steps to warm up for
lr_decay_iters: 50000 # should be ~= max_iters per Chinchilla
min_lr: 3.0e-5 # minimum learning rate, should be ~= learning_rate/10 per Chinchilla

# system
device: 'cuda' # examples: 'cpu', 'cuda', 'cuda:0', 'cuda:1' etc., or try 'mps' on macbooks
dtype: 'bfloat16' # 'float32', 'bfloat16', or 'float16', the latter will auto implement a GradScaler

# wandb logging
wandb_log: True # disabled by default
wandb_project: 'celltempo'